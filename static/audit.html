<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Dashboard — AI Security Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(20, 20, 35, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #e8e8ec;
            --text-secondary: #9295a0;
            --text-muted: #555;
            --accent-green: #00d97e;
            --accent-red: #ff4d6a;
            --accent-amber: #ffb224;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-glass);
            background: var(--bg-card);
        }

        .top-bar h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .top-bar .back-link {
            font-size: 0.85rem;
        }

        .top-bar .actions {
            display: flex;
            gap: 0.6rem;
        }

        .top-bar .actions button {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-glass);
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.75rem;
            cursor: pointer;
        }

        .top-bar .actions button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            padding: 1.5rem 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-green {
            color: var(--accent-green);
        }

        .stat-red {
            color: var(--accent-red);
        }

        .stat-amber {
            color: var(--accent-amber);
        }

        .stat-blue {
            color: var(--accent-blue);
        }

        .stat-purple {
            color: var(--accent-purple);
        }

        .filters-bar {
            display: flex;
            gap: 0.6rem;
            padding: 0 2rem 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters-bar input,
        .filters-bar select {
            padding: 0.45rem 0.7rem;
            border-radius: 8px;
            border: 1px solid var(--border-glass);
            background: var(--bg-glass);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.78rem;
            outline: none;
        }

        .filters-bar input {
            width: 220px;
        }

        .filters-bar select {
            min-width: 110px;
        }

        .filters-bar button {
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            border: none;
            background: var(--accent-blue);
            color: #fff;
            font-family: var(--font-sans);
            font-size: 0.78rem;
            cursor: pointer;
            font-weight: 500;
        }

        .filters-bar button:hover {
            opacity: 0.9;
        }

        .filters-bar .pagination {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .filters-bar .pagination button {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            padding: 0.35rem 0.6rem;
        }

        .events-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        .events-table th,
        .events-table td {
            padding: 0.65rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-glass);
            font-size: 0.78rem;
        }

        .events-table th {
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 0.68rem;
            position: sticky;
            top: 0;
            background: var(--bg-deep);
            z-index: 1;
        }

        .events-table tbody tr {
            cursor: pointer;
            transition: background 0.15s;
        }

        .events-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .events-table .mono {
            font-family: var(--font-mono);
            font-size: 0.72rem;
        }

        .events-table .time {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }

        .badge-allowed {
            background: rgba(0, 217, 126, 0.15);
            color: var(--accent-green);
        }

        .badge-denied {
            background: rgba(255, 77, 106, 0.15);
            color: var(--accent-red);
        }

        .badge-dryrun {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
        }

        .risk-bar {
            display: inline-block;
            width: 50px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            vertical-align: middle;
            margin-right: 6px;
        }

        .risk-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .table-wrap {
            padding: 0 2rem 2rem;
            overflow-x: auto;
        }

        .detail-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
        }

        .detail-modal.active {
            display: flex;
        }

        .detail-content {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
        }

        .detail-content h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .detail-content pre {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .detail-content .close-btn {
            float: right;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .intel-panel {
            display: none;
            margin: 0 2rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-left: 4px solid var(--accent-purple);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .intel-panel.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intel-panel h2 {
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .intel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .threat-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .intel-section {
            margin-bottom: 1rem;
        }

        .intel-section h3 {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .intel-section p,
        .intel-section li {
            font-size: 0.78rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .intel-section ul {
            margin: 0;
            padding-left: 1.2rem;
        }

        .intel-section li {
            margin-bottom: 0.3rem;
        }

        .posture-meter {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .posture-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .posture-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .posture-score {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .btn-intel {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--accent-purple);
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
            font-family: var(--font-sans);
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-intel:hover {
            background: rgba(168, 85, 247, 0.25);
        }

        .btn-intel.loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div>
            <h1>🔍 Audit Dashboard</h1>
            <a href="/" class="back-link">← Back to Gateway</a>
        </div>
        <div class="actions">
            <button class="btn-intel" id="intelBtn" onclick="loadIntelligence()">🧠 AI Intelligence</button>
            <button onclick="exportCSV()">📥 Export CSV</button>
            <button onclick="exportJSON()">📥 Export JSON</button>
            <button onclick="loadStats(); loadEvents();">🔄 Refresh</button>
        </div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-value stat-blue" id="statTotal">-</div>
            <div class="stat-label">Total Events</div>
        </div>
        <div class="stat-card">
            <div class="stat-value stat-green" id="statAllowed">-</div>
            <div class="stat-label">Allowed</div>
        </div>
        <div class="stat-card">
            <div class="stat-value stat-red" id="statDenied">-</div>
            <div class="stat-label">Denied</div>
        </div>
        <div class="stat-card">
            <div class="stat-value stat-amber" id="statAvgRisk">-</div>
            <div class="stat-label">Avg Risk Score</div>
        </div>
        <div class="stat-card">
            <div class="stat-value stat-purple" id="stat24h">-</div>
            <div class="stat-label">Last 24h</div>
        </div>
        <div class="stat-card">
            <div class="stat-value stat-red" id="statInjections">-</div>
            <div class="stat-label">Injection Attempts</div>
        </div>
    </div>

    <!-- AI Intelligence Briefing Panel -->
    <div class="intel-panel" id="intelPanel">
        <div class="intel-header">
            <h2>🧠 AI Security Intelligence Briefing</h2>
            <div style="display:flex;align-items:center;gap:1rem;">
                <span class="threat-badge" id="threatBadge">—</span>
                <div class="posture-meter">
                    <div class="posture-bar">
                        <div class="posture-fill" id="postureFill"></div>
                    </div>
                    <span class="posture-score" id="postureScore">—</span>
                </div>
            </div>
        </div>
        <div id="intelBody">Loading...</div>
    </div>

    <div class="filters-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search events..." oninput="debounceSearch()">
        <select id="filterDecision" onchange="loadEvents()">
            <option value="">All Decisions</option>
            <option value="ALLOWED">Allowed</option>
            <option value="DENIED">Denied</option>
        </select>
        <select id="filterAgent" onchange="loadEvents()">
            <option value="">All Agents</option>
        </select>
        <select id="filterTool" onchange="loadEvents()">
            <option value="">All Tools</option>
            <option value="send_email">send_email</option>
            <option value="read_file">read_file</option>
            <option value="write_file">write_file</option>
            <option value="query_database">query_database</option>
        </select>
        <button onclick="loadEvents()">Apply</button>
        <div class="pagination">
            <button onclick="prevPage()">◀</button>
            <span id="pageInfo">Page 1</span>
            <button onclick="nextPage()">▶</button>
        </div>
    </div>

    <div class="table-wrap">
        <table class="events-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Decision</th>
                    <th>Agent</th>
                    <th>Tool</th>
                    <th>Risk</th>
                    <th>Duration</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody id="eventsBody">
                <tr>
                    <td colspan="7" style="text-align:center;color:var(--text-muted);padding:2rem;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="detail-modal" id="detailModal" onclick="if(event.target===this)closeDetail()">
        <div class="detail-content">
            <button class="close-btn" onclick="closeDetail()">✕</button>
            <h2>📋 Event Detail</h2>
            <pre id="detailJson"></pre>
        </div>
    </div>

    <script>
        const API_KEY = 'sg-dev-key-2026';
        const HEADERS = { 'X-API-Key': API_KEY };
        let currentOffset = 0;
        const PAGE_SIZE = 30;
        let totalEvents = 0;
        let debounceTimer = null;

        async function loadStats() {
            try {
                const res = await fetch('/audit/stats', { headers: HEADERS });
                const s = await res.json();
                document.getElementById('statTotal').textContent = s.total_events;
                document.getElementById('statAllowed').textContent = s.allowed;
                document.getElementById('statDenied').textContent = s.denied;
                document.getElementById('statAvgRisk').textContent = s.avg_risk_score;
                document.getElementById('stat24h').textContent = s.last_24h;
                document.getElementById('statInjections').textContent = s.injection_attempts;

                // Populate agent filter
                const agentSelect = document.getElementById('filterAgent');
                const existingOptions = agentSelect.querySelectorAll('option:not(:first-child)');
                existingOptions.forEach(o => o.remove());
                s.top_agents.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a.agent_id;
                    opt.textContent = `${a.agent_id} (${a.count})`;
                    agentSelect.appendChild(opt);
                });
            } catch (e) { console.error('Stats failed:', e); }
        }

        async function loadEvents() {
            const search = document.getElementById('searchInput').value;
            const decision = document.getElementById('filterDecision').value;
            const agent_id = document.getElementById('filterAgent').value;
            const tool = document.getElementById('filterTool').value;

            const params = new URLSearchParams();
            if (search) params.set('search', search);
            if (decision) params.set('decision', decision);
            if (agent_id) params.set('agent_id', agent_id);
            if (tool) params.set('tool', tool);
            params.set('limit', PAGE_SIZE);
            params.set('offset', currentOffset);

            try {
                const res = await fetch(`/audit/events?${params}`, { headers: HEADERS });
                const data = await res.json();
                totalEvents = data.total;
                renderEvents(data.events);
                updatePagination();
            } catch (e) { console.error('Events failed:', e); }
        }

        function renderEvents(events) {
            const tbody = document.getElementById('eventsBody');
            if (!events.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:2rem;">No events found</td></tr>';
                return;
            }
            tbody.innerHTML = events.map(e => {
                const t = new Date(e.timestamp);
                const timeStr = t.toLocaleString();
                const isAllowed = e.decision.includes('ALLOWED');
                const isDryRun = e.decision.includes('DRY RUN');
                const badgeClass = isDryRun ? 'badge-dryrun' : (isAllowed ? 'badge-allowed' : 'badge-denied');
                const badgeText = isDryRun ? 'DRY RUN' : (isAllowed ? 'ALLOWED' : 'DENIED');
                const riskColor = e.risk_score > 70 ? 'var(--accent-red)' : e.risk_score > 40 ? 'var(--accent-amber)' : 'var(--accent-green)';
                const riskPct = Math.min(e.risk_score, 100);
                const dur = e.duration_ms ? `${e.duration_ms.toFixed(0)}ms` : '-';
                const reason = e.reason.length > 60 ? e.reason.slice(0, 60) + '...' : e.reason;

                return `<tr onclick='showDetail(${JSON.stringify(JSON.stringify(e))})'>
                    <td class="time">${timeStr}</td>
                    <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                    <td class="mono">${e.agent_id}</td>
                    <td class="mono">${e.tool}</td>
                    <td><div class="risk-bar"><div class="risk-fill" style="width:${riskPct}%;background:${riskColor}"></div></div>${e.risk_score}</td>
                    <td class="mono">${dur}</td>
                    <td style="color:var(--text-secondary)">${reason}</td>
                </tr>`;
            }).join('');
        }

        function updatePagination() {
            const page = Math.floor(currentOffset / PAGE_SIZE) + 1;
            const totalPages = Math.ceil(totalEvents / PAGE_SIZE) || 1;
            document.getElementById('pageInfo').textContent = `Page ${page} of ${totalPages} (${totalEvents} events)`;
        }

        function prevPage() {
            if (currentOffset >= PAGE_SIZE) { currentOffset -= PAGE_SIZE; loadEvents(); }
        }
        function nextPage() {
            if (currentOffset + PAGE_SIZE < totalEvents) { currentOffset += PAGE_SIZE; loadEvents(); }
        }

        function debounceSearch() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => { currentOffset = 0; loadEvents(); }, 300);
        }

        function showDetail(jsonStr) {
            const obj = JSON.parse(jsonStr);
            document.getElementById('detailJson').textContent = JSON.stringify(obj, null, 2);
            document.getElementById('detailModal').classList.add('active');
        }
        function closeDetail() {
            document.getElementById('detailModal').classList.remove('active');
        }

        async function exportCSV() {
            window.open(`/audit/export?format=csv&limit=5000`, '_blank');
        }
        async function exportJSON() {
            window.open(`/audit/export?format=json&limit=5000`, '_blank');
        }

        async function loadIntelligence() {
            const btn = document.getElementById('intelBtn');
            const panel = document.getElementById('intelPanel');
            btn.classList.add('loading');
            btn.textContent = '🧠 Analyzing...';
            panel.classList.add('visible');
            document.getElementById('intelBody').innerHTML = '<p style="color:var(--text-muted)">Generating AI security briefing...</p>';

            try {
                const res = await fetch('/audit/intelligence', { headers: HEADERS });
                if (!res.ok) throw new Error('LLM unavailable');
                const d = await res.json();

                // Threat badge
                const tb = document.getElementById('threatBadge');
                const threatColors = { low: '#00d97e', moderate: '#ffb224', elevated: '#f59e0b', high: '#ff4d6a', critical: '#ef4444' };
                const threatBgs = { low: 'rgba(0,217,126,0.15)', moderate: 'rgba(255,178,36,0.15)', elevated: 'rgba(245,158,11,0.15)', high: 'rgba(255,77,106,0.15)', critical: 'rgba(239,68,68,0.2)' };
                tb.textContent = (d.threat_level || 'unknown').toUpperCase();
                tb.style.background = threatBgs[d.threat_level] || threatBgs.moderate;
                tb.style.color = threatColors[d.threat_level] || threatColors.moderate;

                // Posture score
                const score = d.posture_score || 0;
                const scoreColor = score >= 70 ? '#00d97e' : score >= 40 ? '#ffb224' : '#ff4d6a';
                document.getElementById('postureScore').textContent = score + '/100';
                document.getElementById('postureScore').style.color = scoreColor;
                const fill = document.getElementById('postureFill');
                fill.style.width = score + '%';
                fill.style.background = scoreColor;

                // Build body
                let html = '';
                html += `<div class="intel-section"><h3>Executive Summary</h3><p style="color:var(--text-primary);font-weight:500">${d.executive_summary || '—'}</p></div>`;

                if (d.key_findings && d.key_findings.length) {
                    html += '<div class="intel-section"><h3>Key Findings</h3><ul>';
                    d.key_findings.forEach(f => html += `<li>${f}</li>`);
                    html += '</ul></div>';
                }
                if (d.anomalies && d.anomalies.length) {
                    html += '<div class="intel-section"><h3>⚠️ Anomalies Detected</h3><ul>';
                    d.anomalies.forEach(a => html += `<li style="color:var(--accent-amber)">${a}</li>`);
                    html += '</ul></div>';
                }
                if (d.trends) {
                    const trendIcon = d.trends.risk_trend === 'increasing' ? '📈' : d.trends.risk_trend === 'decreasing' ? '📉' : '➡️';
                    html += `<div class="intel-section"><h3>Trends</h3><p>${trendIcon} ${d.trends.description || '—'}</p></div>`;
                }
                if (d.recommendations && d.recommendations.length) {
                    html += '<div class="intel-section"><h3>Recommendations</h3><ul>';
                    d.recommendations.forEach(r => html += `<li style="color:var(--accent-blue)">${r}</li>`);
                    html += '</ul></div>';
                }
                html += `<div style="font-size:0.65rem;color:var(--text-muted);margin-top:0.5rem">Generated at ${d.generated_at || '—'} | Analysis time: ${d.analysis_time_ms || '—'}ms</div>`;
                document.getElementById('intelBody').innerHTML = html;

            } catch (e) {
                document.getElementById('intelBody').innerHTML = `<p style="color:var(--accent-red)">Failed to generate intelligence briefing: ${e.message}</p>`;
            }
            btn.classList.remove('loading');
            btn.textContent = '🧠 AI Intelligence';
        }

        // Init
        loadStats();
        loadEvents();
        setInterval(loadStats, 30000);
    </script>
</body>

</html>
